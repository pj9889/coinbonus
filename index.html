<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; overflow: hidden; width: 100%; }
        body {
            background: url('pic1.webp') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }
        .main-wrapper {
            width: 95%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 85vh;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
        }
        .app-box {
            position: relative;
            aspect-ratio: 1/1;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255, 204, 0, 0.4);
        }
        .app-box::before {
            content: '';
            position: absolute;
            width: 160%;
            height: 160%;
            background: conic-gradient(transparent, transparent, transparent, #ff0000);
            animation: rotate 2s linear infinite;
        }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .app-box::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 10px;
        }
        .game-content {
            position: relative;
            z-index: 2;
            width: 85%;
            height: 85%;
            animation: shining 1.5s infinite alternate;
        }
        .game-content img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        @keyframes shining { from { filter: drop-shadow(0 0 1px #ffcc00); } to { filter: drop-shadow(0 0 8px #ffcc00); } }
        .special-btn {
            position: relative;
            width: 100%;
            padding: 20px;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            background: #ff0000;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            margin-top: auto;
        }
        .special-btn.clicked {
            background: #ffcc00 !important;
            color: #000 !important;
            box-shadow: 0 0 30px #ffcc00;
        }
        .loading-overlay {
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
        }
        .special-btn.clicked .loading-overlay { animation: fill 2s linear forwards; }
        @keyframes fill { 0% { left: -100%; } 100% { left: 0%; } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div style="font-family: 'Orbitron'; color: #ffcc00; letter-spacing: 2px;">ELITE GAMES</div>

        <div class="app-grid">
            <div class="app-box" onclick="goToSite()"><div class="game-content"><img src="g1.webp"></div></div>
            <div class="app-box" onclick="goToSite()"><div class="game-content"><img src="g2.webp"></div></div>
            <div class="app-box" onclick="goToSite()"><div class="game-content"><img src="g3.webp"></div></div>
            <div class="app-box" onclick="goToSite()"><div class="game-content"><img src="g4.webp"></div></div>
            <div class="app-box" onclick="goToSite()"><div class="game-content"><img src="g5.webp"></div></div>
            <div class="app-box" onclick="goToSite()"><div class="game-content"><img src="g6.webp"></div></div>
            <div class="app-box" onclick="goToSite()"><div class="game-content"><img src="g7.webp"></div></div>
            <div class="app-box" onclick="goToSite()"><div class="game-content"><img src="g8.webp"></div></div>
            <div class="app-box" onclick="goToSite()"><div class="game-content"><img src="g9.webp"></div></div>
            <div class="app-box" onclick="goToSite()"><div class="game-content"><img src="g10.webp"></div></div>
        </div>

        <button class="special-btn" id="mainBtn" onclick="goToSite()">
            খে লা শুরু করুন
            <div class="loading-overlay"></div>
        </button>
    </div>

    <script>
        const MAIN_URL = "https://12xbet.pages.dev/";
        function goToSite() {
            const btn = document.getElementById('mainBtn');
            btn.classList.add('clicked');
            window.location.href = MAIN_URL;
        }
    </script>
</body>
</html>
