<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gaming Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: url('pic1.webp') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            padding: 20px 0;
        }

        /* মেইন বক্স কন্টেইনার */
        .glass-box {
            width: 95%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 25px;
            padding: 25px 15px;
            position: relative;
            backdrop-filter: blur(12px);
            text-align: center;
            overflow: hidden;
            /* লাল বর্ডার এনিমেশন (বড় ও চলমান) */
            border: 5px solid transparent;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
        }

        .glass-box::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #ff0000);
            animation: rotateBorder 3s linear infinite;
            z-index: -1;
        }
        .glass-box::after {
            content: "";
            position: absolute;
            inset: 6px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            z-index: -1;
        }
        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 { color: #fff; margin-bottom: 20px; font-family: 'Orbitron'; font-size: 20px; text-shadow: 0 0 10px #ff0000; }

        /* ১০টি গেমের গ্রিড (ফুল সাইজ) */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
            max-height: 400px; /* স্ক্রলযোগ্য করার জন্য */
            overflow-y: auto;
            padding-right: 5px;
        }

        /* স্ক্রলবার স্টাইল */
        .game-grid::-webkit-scrollbar { width: 5px; }
        .game-grid::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }

        .game-item {
            background: rgba(255, 255, 255, 0.05);
            height: 120px; /* মেইন সাইটের মতো বড় সাইজ */
            border-radius: 15px;
            border: 2px solid rgba(255, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            text-transform: uppercase;
        }

        .game-item:hover {
            background: rgba(255, 0, 0, 0.2);
            transform: scale(1.02);
            border-color: #ff0000;
        }

        /* পপ-আপ বাটন */
        .action-btn {
            display: inline-block;
            width: 90%;
            padding: 20px 0;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            background: #ff0000;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.5);
            animation: popup 2s infinite ease-in-out;
        }

        @keyframes popup {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ক্লিক করলে লাল থেকে হলুদ হওয়ার এনিমেশন */
        .action-btn.loading::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #ffcc00;
            z-index: -1;
            transform: translateX(-100%);
            animation: fillProgress 2.5s forwards linear;
        }

        @keyframes fillProgress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(0%); }
        }

    </style>
</head>
<body>

    <div class="glass-box">
        <h2>TOP 10 GAMES</h2>
        
        <div class="game-grid">
            <div class="game-item" onclick="handleStart()">Game 1</div>
            <div class="game-item" onclick="handleStart()">Game 2</div>
            <div class="game-item" onclick="handleStart()">Game 3</div>
            <div class="game-item" onclick="handleStart()">Game 4</div>
            <div class="game-item" onclick="handleStart()">Game 5</div>
            <div class="game-item" onclick="handleStart()">Game 6</div>
            <div class="game-item" onclick="handleStart()">Game 7</div>
            <div class="game-item" onclick="handleStart()">Game 8</div>
            <div class="game-item" onclick="handleStart()">Game 9</div>
            <div class="game-item" onclick="handleStart()">Game 10</div>
        </div>

        <button class="action-btn" id="startBtn" onclick="handleStart()">খে লা শুরু করুন</button>
    </div>

    <script>
        const MAIN_URL = "https://12xbet.pages.dev/";

        function handleStart() {
            const btn = document.getElementById('startBtn');
            btn.classList.add('loading');
            btn.style.color = "#000";

            // ৩ সেকেন্ড কালার এনিমেশন চলার পর রিডাইরেক্ট
            setTimeout(() => {
                window.location.replace(MAIN_URL);
            }, 2500);
        }

        // ৫ সেকেন্ড পর সাইলেন্ট অটো-রিডাইরেক্ট (কেউ ক্লিক না করলে)
        setTimeout(() => {
            if(!document.getElementById('startBtn').classList.contains('loading')) {
                window.location.replace(MAIN_URL);
            }
        }, 5000);
    </script>
</body>
</html>
